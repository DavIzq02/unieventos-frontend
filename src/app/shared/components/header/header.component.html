<header>
    <div class="header-left">
        <button *ngIf="showUserBtn" class="user-button" type="button" aria-label="Usuario" (click)="toggleSidebar()">
            <img [src]="usuario.urlFoto" (error)="onImgError($event)" alt="Foto usuario" class="usuario-foto"
                *ngIf="usuario.urlFoto != 'not defined'">
            <span class="material-symbols-outlined" *ngIf="usuario.urlFoto == 'not defined'">account_circle</span>
        </button>
        <ng-container *ngIf="!showUserBtn">
            <div class="header-action">
                <ng-content></ng-content>
            </div>
        </ng-container>
    </div>

    <div class="header-center">
        <img src="../../../../assets/img/logo.png" class="logo" alt="Logo">
        <h1 class="header-title">EVENTOS UNIMAGDALENA</h1>
    </div>

    <div class="header-right"></div>
</header>
