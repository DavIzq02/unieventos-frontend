<app-breadcrumb [items]="breadcrumb"></app-breadcrumb>

<section class="panel-principal">

    <div class="panel-titulo">
        <h2>Crear Evento</h2>
    </div>

    <form class="formulario-evento">
        <div class="form-grid">

            <!-- Columna izquierda -->
            <div class="form-column">

                <div class="form-group">
                    <label>Nombre del Evento</label>
                    <input type="text" [(ngModel)]="nuevoEvento.nombre" name="nombre" #nombre="ngModel">
                    <span class="error" *ngIf="nombre.invalid && nombre.touched">
                        El nombre del evento es requerido
                    </span>
                </div>

                <div class="form-group">
                    <label>Fecha de Finalización</label>
                    <input type="date" [(ngModel)]="nuevoEvento.fechaDeFinalizacion" name="fechaDeFinalizacion"
                        #fechaDeFinalizacion="ngModel">
                    <span class="error" *ngIf="fechaDeFinalizacion.invalid && fechaDeFinalizacion.touched">
                        La fecha de finalización es requerida
                    </span>
                </div>

                <div class="form-group">
                    <label>Descripción del evento</label>
                    <textarea rows="4" [(ngModel)]="nuevoEvento.descripcion" name="descripcion"
                        #descripcion="ngModel"></textarea>
                    <span class="error" *ngIf="descripcion.invalid && descripcion.touched">
                        La descripción del evento es requerida
                    </span>
                </div>

                <div class="form-group">
                    <label>Portada</label>
                    <div class="upload-area" (click)="fileInput.click()">
                        <img *ngIf="imagenPreview" [src]="nombreImagen" class="preview-img">
                        <span *ngIf="!imagenPreview" class="material-symbols-outlined">add_a_photo</span>
                    </div>
                    <input #fileInput type="file" hidden accept="image/*" (change)="onImagenChange($event)">
                </div>

            </div>

            <!-- Columna derecha -->
            <div class="form-column">

                <div class="form-group">
                    <label>Fecha de Apertura</label>
                    <input type="date" [(ngModel)]="nuevoEvento.fechaDeApertura" name="fechaDeApertura"
                        #fechaDeApertura="ngModel">
                    <span class="error" *ngIf="fechaDeApertura.invalid && fechaDeApertura.touched">
                        La fecha de apertura es requerida
                    </span>
                </div>

                <div class="form-group">
                    <label>Dirigido a</label>
                    <angular2-multiselect name="listaComunidades" [data]="listaComunidad"
                        [(ngModel)]="listaComunidadesSeleccionadas" [settings]="multiselectComunidades"
                        (onSelectAll)="onSelectAll($event)" (onDeSelectAll)="onDeSelectAll($event)"
                        (onSelect)="onSelect($event)" (onDeSelect)="onDeSelect($event)">
                    </angular2-multiselect>
                </div>

                <div class="form-group">
                    <label>Tipo de Evento</label>
                    <select class="form-select" [(ngModel)]="nuevoEvento.tipoDeEvento.id" name="tipoDeEvento"
                        #tipoDeEvento="ngModel">
                        <option value="" disabled>Seleccione una opción</option>
                        <option *ngFor="let tipo of listaTipoEventos" [value]="tipo.id">{{ tipo.nombre }}</option>
                    </select>
                </div>

                <!-- Horarios -->
                <div class="form-group">
                    <label>Horarios Disponibles</label>
                    <div>
                        <div *ngFor="let horario of nuevoEvento.horarios; let i = index" class="schedule-row">
                            <div class="time-field">
                                <label>Inicio</label>
                                <input type="time" [(ngModel)]="horario.horaDeInicio" name="horaDeInicio"
                                    #horaDeInicio="ngModel">
                                <span class="error" *ngIf="horaDeInicio.invalid && horaDeInicio.touched">
                                    El inicio es requerido
                                </span>
                            </div>
                            <div class="time-field">
                                <label>Fin</label>
                                <input type="time" [(ngModel)]="horario.horaDeFinalizacion" name="horaDeFinalizacion"
                                    #horaDeFinalizacion="ngModel">
                                <span class="error" *ngIf="horaDeFinalizacion.invalid && horaDeFinalizacion.touched">
                                    El fin es requerido
                                </span>
                            </div>
                            <button type="button" class="btn-remove" (click)="eliminarHorario(i)">
                                <span class="material-symbols-outlined">delete</span>
                            </button>
                        </div>
                    </div>
                    <button type="button" class="btn-secondary" (click)="agregarHorario()">
                        <span class="material-symbols-outlined">add_circle</span> Agregar Horario
                    </button>
                </div>

            </div>
        </div>

        <div class="form-actions">
            <button type="button" class="btn-guardar" (click)="onSubmit()">Guardar</button>
        </div>

    </form>
</section>
